name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shared-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run shared domain core tests (no deps)
        run: node --experimental-strip-types --import ./packages/shared/test/register-ts.mjs packages/shared/test/run.ts

  api-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: workshop
          POSTGRES_PASSWORD: workshop
          POSTGRES_DB: workshop
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U workshop"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://workshop:workshop@localhost:5432/workshop
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations
        run: node apps/api/scripts/migrate.js
      - name: Build
        run: pnpm -r build

