<?xml version="1.0" encoding="UTF-8"?>
<!--
  Workshop OS brand mark. A font-independent geometric lockup so it renders
  identically everywhere (header, favicon source, share preview): a rounded
  badge in the brand blue, a forward-leaning speed swoosh suggesting transport
  and motion (echoing A-SPRINT's transport identity), and a wrench notch for the
  workshop. This is a clean placeholder-grade mark; A-SPRINT's official logo file
  can be dropped in to replace /logo.svg without any code change.
-->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Workshop OS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f6fb3"/>
      <stop offset="1" stop-color="#1d4f86"/>
    </linearGradient>
  </defs>
  <!-- Badge -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bg)"/>
  <!-- Speed swooshes (motion / transport) -->
  <path d="M120 196 H392 L344 248 H72 Z" fill="#ffffff" opacity="0.95"/>
  <path d="M150 276 H392 L344 328 H102 Z" fill="#9ec7f0" opacity="0.9"/>
  <!-- Wrench notch (workshop) -->
  <g fill="#ffffff">
    <circle cx="356" cy="372" r="40"/>
    <rect x="196" y="356" width="150" height="32" rx="16"/>
    <path d="M356 332 a40 40 0 0 1 0 80 a28 28 0 0 0 0 -80 Z" fill="#1d4f86"/>
  </g>
</svg>
